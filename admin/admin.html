
<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Dashboard</title>
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../nav.css">
    <link rel="stylesheet" href="admin.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <!-- Include the Firebase configuration script -->
    <script type="module" src="../firebaseconfig.js"></script>
    <!-- Include your main admin script -->
    <script type="module" src="admin.js"></script>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="site-nav">
        <a href="../home/site.html" class="nav-logo">
            <img src="../images/hair_logo.jpg" alt="Logo" class="nav-logo-img">
        </a>
        <div class="nav-links">
            <a href="../home/site.html" class="nav-link">الرئيسية</a>
            <a href="../reserve/reserve.html" class="nav-link">احجز</a>
            <a href="../buy/Buy.html" class="nav-link">بضائعنا</a>
            <a href="../admin/admin.html" class="nav-login-btn active">تسجيل الدخول</a>
        </div>
    </nav>
    <header>
        <input type="date" id="date-input" value="" />
        <button id="add-reservation-btn">إضافة حجز</button>
    </header>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Please enter your credentials</h2>
            <form id="login-form">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <input type="submit" value="Login">
            </form>
        </div>
    </div>

    <main id="appointments" style="display:none;">
        <h2>Appointments</h2>
        <div id="appointments-list"></div>
    </main>

    <!-- Add Reservation Modal -->
    <div id="reservation-modal" class="modal">
        <div class="modal-content">
            <span class="close-reservation">&times;</span>
            <h2>إضافة حجز جديد</h2>
            <div class="form-grid">
                <div>
                    <label for="reservation-time">وقت الحجز</label>
                    <select id="reservation-time">
                        <option value="" disabled selected>--:--</option>
                    </select>
                </div>
                <div>
                    <label for="reservation-date">تاريخ الحجز</label>
                    <input type="date" id="reservation-date" required>
                </div>
                <div>
                    <label for="phone">رقم الجوال</label>
                    <input type="tel" id="phone" name="phone" required pattern="[0-9]{9}" placeholder="Enter 9 digit number">
                </div>
                <div>
                    <label for="area-code">كود الدولة</label>
                    <select id="area-code" name="area-code" required>
                        <option value="" disabled selected>اختر</option>
                        <option value="+972">+972</option>
                        <option value="+970">+970</option>
                    </select>
                </div>
                <div class="full-width">
                    <label for="customer-name">اسم الزبون</label>
                    <div style="position:relative;">
                        <input type="text" id="customer-name" name="name" autocomplete="name" required>
                        <div id="name-suggestions" class="suggestions-box"></div>
                    </div>
                </div>
                <div class="full-width">
                    <label>اختر الخدمات</label>
                    <div class='dropdown'>
                        <button type='button' class='dropbtn' id='service-dropdown-btn'>اختر الخدمات</button>
                        <div class='dropdown-content' id='service-dropdown'>
                            <label><input type="checkbox" value="قص شعر للرجال"> قص شعر للرجال</label>
                            <label><input type="checkbox" value="قص شعر للأطفال"> قص شعر للأطفال</label>
                            <label><input type="checkbox" value="شعر و ذقن"> شعر و ذقن</label>
                            <label><input type="checkbox" value="تحديد ذقن"> تحديد ذقن</label>
                            <label><input type="checkbox" value="حلاقة ذقن"> حلاقة ذقن</label>
                            <label><input type="checkbox" value="شمع و خيط"> شمع و خيط</label>
                            <label><input type="checkbox" value="حناء"> حناء</label>
                            <label><input type="checkbox" value="شمع الهوبي"> شمع الهوبي</label>
                            <label><input type="checkbox" value="صبغة"> صبغة</label>
                            <label><input type="checkbox" value="تمليس"> تمليس</label>
                            <label><input type="checkbox" value="تنظيف بشرة"> تنظيف بشرة</label>
                            <label><input type="checkbox" value="سشوار"> سشوار</label>
                            <label><input type="checkbox" value="الثلاثي جبران"> الثلاثي جبران</label>
                            <label><input type="checkbox" value="حمام زيت"> حمام زيت</label>
                        </div>
                    </div>
                </div>
                <input type="submit" value="إضافة حجز" id="submit-reservation" class="full-width">
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Your Barber Shop. All rights reserved.</p>
    </footer>

</body>
</html>
